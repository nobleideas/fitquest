name: fit_quest
description: "Social Fitness."
publish_to: "none"
version: 0.1.0

environment:
  sdk: ^3.9.0

dependencies:
  flutter:
    sdk: flutter
  shared_preferences: ^2.2.3
  sqflite_common_ffi_web: ^1.0.1+2
  share_plus: ^10.0.2
  english_words: ^4.0.0
  image_picker: ^1.0.7
  video_player: ^2.8.2
  provider: ^6.1.5
  sqflite: ^2.4.2
  path: ^1.9.1
  firebase_core: ^3.0.0
  firebase_messaging: ^15.0.0
  supabase_flutter: ^2.10.3
  mobile_scanner: ^3.5.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^6.0.0
  flutter_launcher_icons: ^0.13.1

flutter_launcher_icons:
  android: true
  ios: true
  image_path: assets/icon/app_icon.png
  remove_alpha_ios: true

  web:
    generate: true
    image_path: assets/icon/app_icon.png
    background_color: "#FFFFFF"
    theme_color: "#FFFFFF"


flutter:
  uses-material-design: true
  assets:
    - assets/icon/